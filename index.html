<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебе 💕</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd1dc, #f3c6ff);
  font-family: Arial, sans-serif;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  position: relative;
}

h2 {
  margin-bottom: 20px;
  color: #555;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  font-size: 16px;
  cursor: pointer;
  margin: 10px;
}

#yes {
  background: #ff4d88;
  color: white;
}

#no {
  background: #eee;
  position: absolute;
}
</style>
</head>

<body>

<div class="card">
  <h2>Соскучилась по мне? 🥺💕</h2>

  <button id="yes" onclick="yesClick()">Да, очень 💞</button>
  <button id="no">Нет 😢</button>
</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
  const card = document.querySelector(".card");

  const maxX = card.offsetWidth - noBtn.offsetWidth;
  const maxY = card.offsetHeight - noBtn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

function yesClick() {
  alert("Я знав 😏💕");
}
</script>

</body>
</html>
